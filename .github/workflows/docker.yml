name: Docker

# Builds the matrimail container image on:
#   - pushes to main / feat-* (so feature branches get a publishable image)
#   - tag pushes (v*.*.* → versioned image + :latest)
#   - manual dispatch (operator can re-cut from any ref)
#   - PRs (build only, no push — sanity-check that the Dockerfile still builds)
#
# Pushes to GitHub Container Registry under the repo's namespace
# (ghcr.io/<owner>/<repo>). GHCR auth uses the workflow's built-in GITHUB_TOKEN
# — no secrets to configure.
#
# Multi-arch: linux/amd64 + linux/arm64 (covers x86 servers and Apple Silicon /
# Raspberry Pi self-hosters).

on:
  push:
    branches:
      - main
      - "feat/**"
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write       # needed to push to ghcr.io
  id-token: write       # reserved: enables future cosign / OIDC keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Skip the GHCR login on PRs from forks — they don't have write access
      # to packages and we'd push nothing anyway. The build still runs as a
      # smoke test.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy:
      #   - branch builds → ghcr.io/.../matrimail:<branch>
      #   - tag builds    → ghcr.io/.../matrimail:<version>  +  :latest
      #   - any commit    → ghcr.io/.../matrimail:sha-<short-sha>
      # docker/metadata-action handles slash-sanitization (feat/foo → feat-foo).
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Don't push from PRs — write access isn't guaranteed and we don't
          # want PR images polluting the registry. Pushes from main / feat /
          # tags / dispatch all publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache layer — keeps incremental builds fast (~1-2 min instead
          # of ~5-8 for a cold build).
          cache-from: type=gha
          cache-to: type=gha,mode=max
